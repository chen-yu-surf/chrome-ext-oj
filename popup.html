<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI编程助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
    }
    .header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e8e8e8;
    }
    .header h1 {
      font-size: 16px;
      color: #1a73e8;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 12px;
      color: #666;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus {
      border-color: #1a73e8;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      margin-bottom: 8px;
    }
    .btn:hover {
      opacity: 0.85;
    }
    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-success {
      background: #34a853;
      color: #fff;
    }
    .btn-secondary {
      background: #5f6368;
      color: #fff;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.success {
      display: block;
      background: #e6f4ea;
      color: #1e8e3e;
    }
    .status.error {
      display: block;
      background: #fce8e6;
      color: #d93025;
    }
    .status.info {
      display: block;
      background: #e8f0fe;
      color: #1a73e8;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 AI编程助手</h1>
    <p>配置 LLM 接口信息</p>
  </div>

  <div class="form-group">
    <label>LLM API 网址</label>
    <input type="text" id="apiUrl" value="https://api.deepseek.com" placeholder="https://api.deepseek.com">
  </div>

  <div class="form-group">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="输入你的 API Key">
  </div>

  <div class="form-group">
    <label>Model 模型名</label>
    <input type="text" id="model" value="deepseek-chat" placeholder="deepseek-chat">
  </div>

  <button class="btn btn-primary" id="btnSave">💾 保存配置</button>
  <button class="btn btn-secondary" id="btnTest">🔗 测试连接</button>
  <button class="btn btn-success" id="btnOpenPanel">📋 打开右侧边栏面板</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
